<div class="cart-line">
  <img
    src="{{ url_for('store.media', filename=item.product.image_path.replace('media/', '', 1)) }}"
    alt="{{ product_name(item.product) }}"
  />
  <div>
    <h3>{{ product_name(item.product) }}</h3>
    <p>{{ item.product.price_cents|money }}</p>
    <form
      class="quantity-form"
      method="post"
      action="{{ url_for('store.cart_update', product_id=item.product.id) }}"
      hx-post="{{ url_for('store.cart_update', product_id=item.product.id) }}"
      hx-target="#cart-panel"
      hx-swap="innerHTML"
    >
      <label>
        <span>{{ t("qty") }}</span>
        <input name="quantity" type="number" min="0" value="{{ item.quantity }}" />
      </label>
      <button class="button button-secondary" type="submit">{{ t("update") }}</button>
    </form>
    <form
      method="post"
      action="{{ url_for('store.cart_remove', product_id=item.product.id) }}"
      hx-post="{{ url_for('store.cart_remove', product_id=item.product.id) }}"
      hx-target="#cart-panel"
      hx-swap="innerHTML"
    >
      <button class="link-button" type="submit">{{ t("remove") }}</button>
    </form>
  </div>
  <strong>{{ item.line_total_cents|money }}</strong>
</div>
